# =============================================================================
# GitHub Actions — build the StarDS library, then build & publish the MkDocs site.
#
# Migrated from .gitlab-ci.yml. Two jobs mirror the old build -> validate -> deploy
# flow:
#   1. build-docs   — compile the SWIG `_pystards` extension, then render the site
#                     with `mkdocs build --strict` (validation on every push/PR).
#   2. deploy-docs  — on push to the default branch only, publish the rendered
#                     site to the `docs` branch, which GitHub Pages serves.
#
# Why the docs build needs the library build:
#   * Python API (mkdocstrings) imports the compiled `_pystards` extension, so the
#     bindings must be built and importable; we put build/bindings/python on
#     PYTHONPATH.
#   * C++ API (mkdoxy) needs `doxygen` (from the conda env) and parses stards.h
#     with the PREDEFINED macros in mkdocs.yml.
#
# The conda env is created from the repo's environment.yml (compilers, cmake,
# ninja, swig, doxygen, numpy, mkdocs, mkdoxy, ...); the docs step adds the few
# extras not pinned there.
# =============================================================================

name: Docs

on:
  push:
    branches: ["**"]
  pull_request:

# Allow the deploy job to push the rendered site to the `docs` branch.
permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # BUILD + VALIDATE — compile the bindings and render the site with --strict on
  # every push and pull request (fails on broken links / API import errors).
  # ---------------------------------------------------------------------------
  build-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}   # login shell so `conda activate` works
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive   # googletest + json are submodules the build needs

      - name: Set up conda environment (environment.yml)
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: stards
          cache-environment: true

      - name: Build Python bindings (SWIG _pystards extension)
        run: |
          mkdir build && cd build
          cmake -S .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSTARDS_BUILD_PYTHON_BINDINGS=ON \
            -DSTARDS_BUILD_TESTS=OFF \
            -DSTARDS_BUILD_TOOLS=OFF
          cmake --build . -j 2

      - name: Install docs-only extras
        # Not pinned in environment.yml. pygments is pinned to 2.18.0 because 2.20
        # breaks pymdownx highlighting.
        run: pip install "mkdocstrings[python]" "mkdocstrings-python" "pygments==2.18.0"

      - name: Build site (strict)
        run: |
          # _pystards.so lives in build/bindings/python so mkdocstrings can import it.
          export PYTHONPATH="$GITHUB_WORKSPACE/build/bindings/python"
          mkdocs build --strict -f docs-site/mkdocs.yml --site-dir "$GITHUB_WORKSPACE/public"

      - name: Upload rendered site
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: public
          retention-days: 7

  # ---------------------------------------------------------------------------
  # DEPLOY — publish to GitHub Pages by pushing the rendered site to the `docs`
  # branch. Runs only on push to the default branch. `mkdocs gh-deploy` builds
  # and force-pushes the HTML; point GitHub Pages at the `docs` branch (root).
  # ---------------------------------------------------------------------------
  deploy-docs:
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    needs: build-docs
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # gh-deploy needs full history to update the docs branch

      - name: Set up conda environment (environment.yml)
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: stards
          cache-environment: true

      - name: Install docs-only extras
        run: pip install "mkdocstrings[python]" "mkdocstrings-python" "pygments==2.18.0"

      - name: Publish site to the `docs` branch (GitHub Pages)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          export PYTHONPATH="$GITHUB_WORKSPACE/build/bindings/python"
          # gh-deploy renders the site and force-pushes it to --remote-branch.
          mkdocs gh-deploy --strict --force \
            --remote-branch docs \
            -f docs-site/mkdocs.yml
