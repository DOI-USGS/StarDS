# =============================================================================
# GitHub Actions — run the StarDS test suites (C++ gtest + Python pytest).
#
# Two independent jobs, both built in the repo's conda env (environment.yml):
#   1. cpp-tests    — configure with tests + tools ON, build the gtest binary,
#                     run it via ctest. Tools are ON so the conversion-parity
#                     test (which shells out to `stards_translate`) actually runs.
#   2. python-tests — build the SWIG `_pystards` extension, then run pytest over
#                     bindings/python/tests with the built module on PYTHONPATH.
#
# Runs on every push (incl. merges) and pull request, across Linux, macOS, and
# Windows (matrix). No network/credentials are required: the S3 tests use an
# in-process mock server / signing fixtures, and the real-S3 tests self-skip when
# AWS credentials are absent.
# =============================================================================

name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # C++ TESTS — gtest suite via ctest. Runs on Linux, macOS, and Windows (same
  # steps); the conda env (incl. the compiler) is provided by setup-micromamba on
  # all three.
  # ---------------------------------------------------------------------------
  cpp-tests:
    strategy:
      fail-fast: false   # one OS failing must not mask the others' results
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}   # login shell so the conda env is activated (works on windows-latest via Git bash)
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive   # googletest + json are submodules the build needs

      - name: Set up conda environment (environment.yml)
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: stards
          cache-environment: true

      # On Windows the compiler comes from conda-forge's cxx-compiler (vs2022_win-64
      # activation), placed on PATH by the login-shell env activation above. If a
      # future runner ever fails to find `cl` for the Ninja generator, add this
      # Windows-only step before Configure as a fallback:
      #   - uses: ilammy/msvc-dev-cmd@v1
      #     if: runner.os == 'Windows'
      - name: Configure (tests + tools ON, bindings OFF)
        run: |
          mkdir build && cd build
          cmake -S .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSTARDS_BUILD_TESTS=ON \
            -DSTARDS_BUILD_TOOLS=ON \
            -DSTARDS_BUILD_PYTHON_BINDINGS=OFF

      - name: Build tests
        run: cmake --build build -j 2

      - name: Run C++ tests (ctest)
        working-directory: build
        run: ctest --output-on-failure --no-tests=error

  # ---------------------------------------------------------------------------
  # PYTHON TESTS — pytest over the SWIG bindings. Runs on Linux, macOS, and
  # Windows; the SWIG build produces _pystards.so / .pyd and conftest.py locates
  # either via PYSTARDS_BUILD_DIR.
  # ---------------------------------------------------------------------------
  python-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up conda environment (environment.yml)
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: stards
          cache-environment: true

      - name: Install pytest extras
        run: pip install pytest

      - name: Build Python bindings (SWIG _pystards extension)
        run: |
          mkdir build && cd build
          cmake -S .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSTARDS_BUILD_PYTHON_BINDINGS=ON \
            -DSTARDS_BUILD_TESTS=OFF \
            -DSTARDS_BUILD_TOOLS=OFF
          cmake --build . -j 2

      - name: Run Python tests (pytest)
        # conftest.py picks up the built extension from PYSTARDS_BUILD_DIR.
        env:
          PYSTARDS_BUILD_DIR: ${{ github.workspace }}/build/bindings/python
        run: pytest bindings/python/tests -v
